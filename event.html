<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Form</title>
    <link rel="stylesheet" href="event.css">
</head>
<body>
    <h1>Driving license</h1>
    <form id="details">
        <label>Name:</label>
        <input type="text" id="name" required>
        <br>
        <label>Email:</label>
        <input type="email" id="mail" required>
        <br>
        <label>phone no:</label>
        <input type="number" id="phone" required>
        <br>
        <label>age:</label>
        <input type="number" id="age" required>
        <br>
        <label>Gender:</label>
        <input type="text" id="gender" required>
        <br>
        <label>Verified</label>
        <input type="checkbox" name="documents" value="RC book">RC Book
        <input type="checkbox" name="documents" value="insurance">insurance
        <input type="checkbox" name="documents" value="pollution">pollution
        <br>
        
        
        <label>Address:</label>
        <input type="text" id="address" required>
        <br>
        <label>Photo:</label>
        <input type="file" id="image" accept="image/*" required>
        <br>
        <button type="submit">submit</button>


    </form> 
    <h2>license details</h2>
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <p id="p4"></p>
    <p id="p5"></p>
    <p id="p6"></p>
    <p id ="p7"></p>
    <img id="dp" width="200px">
    <script src="event.js"></script>
</body>
</html>
